<!DOCTYPE html>
<html>
<head>
  <title>QR Device</title>

  <!-- Meta Responsive (WAJIB untuk HP) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- QR -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .glass-header {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 20px;
      text-align: center;
    }

    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      width: 100%;
    }

    .btn-futuristic {
      background: linear-gradient(90deg, #06b6d4, #3b82f6);
      border: none;
      color: white;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-futuristic:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px #3b82f6;
    }

    canvas {
      margin-top: 20px;
      border-radius: 12px;
      background: white;
      padding: 10px;
      width: 100% !important;
      height: auto !important;
    }

    footer {
      background-color: #111;
      color: #fff;
      padding: 20px 0;
      text-align: center;
      margin-top: auto;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="glass-header">
  <h3>QR Device Generator</h3>
  <small>Gunakan QR ini untuk scan di sistem</small>
</div>

<!-- MAIN -->
<div class="main-content">
  <div class="container">
    <div class="row justify-content-center">
      
      <div class="col-12 col-sm-10 col-md-6 col-lg-4">
        <div class="glass-card">

          <input 
            type="text" 
            id="nip" 
            class="form-control" 
            placeholder="Masukkan NIP"
          >

          <button class="btn btn-futuristic w-100 mt-2" onclick="generateQR()">
            🔳 Generate QR
          </button>

          <button class="btn btn-success w-100 mt-2" onclick="downloadQR()">
            ⬇ Download QR
          </button>

          <canvas id="qrcode"></canvas>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div style="max-width:1100px; margin:auto;">
    
    <p style="margin:0; font-size:16px;">
      © 2026 <strong>@fajartech</strong>. All Rights Reserved.
    </p>

    <p style="margin:5px 0 0; font-size:14px; color:#bbb;">
      Built with ❤️ using HTML, CSS & JavaScript
    </p>

  </div>
</footer>

<script>
function getDeviceId() {
  let id = localStorage.getItem("deviceId");

  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("deviceId", id);
  }

  return id;
}

function generateQR() {
  const nip = document.getElementById("nip").value.trim();

  if (!nip) return alert("Isi NIP!");

  const data = {
    nip,
    deviceId: getDeviceId(),
    deviceInfo: navigator.userAgent
  };

  const encoded = btoa(JSON.stringify(data));

  QRCode.toCanvas(document.getElementById("qrcode"), encoded);
}

function downloadQR() {
  const canvas = document.getElementById("qrcode");

  const link = document.createElement("a");
  link.download = "qr-device.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
