<!DOCTYPE html>
<html>
<head>
  <title>QR Device</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- QR Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .container-box {
      background: rgba(255,255,255,0.06);
      padding: 20px;
      border-radius: 16px;
      width: 100%;
      max-width: 320px;
    }

    /* 🔥 FIX QR AGAR TIDAK KELUAR */
    canvas {
      display: block;
      margin: 15px auto 0;
      width: 100% !important;
      height: auto !important;
      max-width: 100%;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }
  </style>

</head>

<body>

<!-- HEADER -->
<div style="padding:20px; text-align:center;">
   <img src="image/logo.png" alt="Logo" style="width: 50px; height: 50px; margin-bottom: 20px;">
  <h3>QR Device Generator</h3>
</div>

<!-- MAIN -->
<div style="flex:1; display:flex; justify-content:center; align-items:center; padding:20px;">
  
  <div class="container-box">

    <input type="text" id="nip" class="form-control" placeholder="NIP">

    <input type="text" id="deviceName" class="form-control mt-2" placeholder="Nama HP">

    <input type="text" id="deviceColor" class="form-control mt-2" placeholder="Warna HP">

    <button class="btn btn-primary w-100 mt-2" onclick="generateQR()">
      Generate
    </button>

    <button class="btn btn-success w-100 mt-2" onclick="downloadQR()">
      Download
    </button>

    <canvas id="qrcode"></canvas>

  </div>

</div>

 

  <footer style="background:#111; padding:20px; text-align:center;">
      <p style="margin:0; font-size:14px;">
      © 2026 <strong>@fajartech</strong>. All Rights Reserved.
    </p>

    <p style="margin:5px 0 0; font-size:14px; color:#bbb;">
      Built with ❤️ using HTML, CSS & JavaScript
    </p>
</footer>


<script>

function getDeviceId() {
  let id = localStorage.getItem("deviceId");

  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem("deviceId", id);
  }

  return id;
}

function generateQR() {
  const nip = document.getElementById("nip").value.trim();
  const deviceName = document.getElementById("deviceName").value.trim();
  const deviceColor = document.getElementById("deviceColor").value.trim();

  if (!nip) return alert("Isi NIP!");

  const data = {
    nip,
    deviceId: getDeviceId(),
    deviceInfo: navigator.userAgent,
    deviceName,
    deviceColor
  };

  const encoded = btoa(JSON.stringify(data));

  QRCode.toCanvas(
    document.getElementById("qrcode"),
    encoded,
    {
      width: 250,   // 🔥 supaya tidak overflow
      margin: 2
    }
  );
}

function downloadQR() {
  const canvas = document.getElementById("qrcode");

  const link = document.createElement("a");
  link.download = "qr-device.png";
  link.href = canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
